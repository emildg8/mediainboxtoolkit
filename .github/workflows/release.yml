# Релиз по тегу vX.Y.Z: ZIP + оформленное описание из CHANGELOG.md
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build ZIP and release notes
        id: pack
        shell: pwsh
        env:
          MIT_MONO_CHANGELOG_URL: 'https://github.com/emildg8/SeriesToolkit/blob/master/MediaInboxToolkit/CHANGELOG.md'
        run: |
          $tag = $env:GITHUB_REF_NAME.Trim()
          $ver = $tag.TrimStart('v')
          $out = $env:RUNNER_TEMP
          $script = Join-Path $env:GITHUB_WORKSPACE '.github/scripts/Build-MediaInboxRelease.ps1'
          & $script -Version $ver -OutDir $out -MonorepoChangelogUrl $env:MIT_MONO_CHANGELOG_URL -RepoRoot $env:GITHUB_WORKSPACE
          $zipItem = Get-ChildItem -LiteralPath $out -Filter ('MediaInboxToolkit-{0}.zip' -f $ver) -File | Select-Object -First 1
          if (-not $zipItem) { throw "ZIP not found under $out" }
          $line = "zip_path=$($zipItem.FullName)$([char]10)"
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, $line, [System.Text.UTF8Encoding]::new($false))

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          name: MediaInboxToolkit ${{ github.ref_name }}
          body_path: ${{ runner.temp }}/release-body.md
          files: ${{ steps.pack.outputs.zip_path }}
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
